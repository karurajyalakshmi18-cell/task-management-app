<!DOCTYPE html>
<html>
<head>
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">
  <h2>AI Chatbot 🤖</h2>

  <!-- Chat Display -->
  <div id="chat-box"></div>

  <!-- Input -->
  <input type="text" id="userInput" placeholder="Type message..." />
  <button onclick="sendMessage()">Send</button>

  <br><br>

  <!-- Buttons -->
  <button onclick="startGame()">🎮 Guess Game</button>
  <button onclick="startQuiz()">🧠 Quiz</button>
  <button onclick="startRPS()">✊ Rock Paper</button>
  <button onclick="startMathGame()">➕ Math Game</button>

</div>

<script src="script.js"></script>

</body>
</html>
